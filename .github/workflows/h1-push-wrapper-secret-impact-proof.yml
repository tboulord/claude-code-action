name: H1 Push Wrapper Secret Impact Proof

on:
  push:
    branches:
      - h1-push-wrapper-secret-impact-proof
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    env:
      H1_DUMMY_SUPPLY_CHAIN_SECRET: ${{ secrets.H1_DUMMY_SUPPLY_CHAIN_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Non-destructive secret-read impact proof
        shell: bash
        run: |
          set +e
          "$GITHUB_WORKSPACE/scripts/git-push.sh" origin "$(
            echo 'H1_SUPPLY_CHAIN_SECRET_READ_IN_PARENT_SHELL' >&2
            if [ -n "${H1_DUMMY_SUPPLY_CHAIN_SECRET:-}" ]; then
              echo 'secret_present=True' >&2
            else
              echo 'secret_present=False' >&2
            fi
            if [ "${H1_DUMMY_SUPPLY_CHAIN_SECRET:-}" = 'h1_dummy_supply_chain_secret_do_not_use' ]; then
              echo 'dummy_secret_matched=True' >&2
            else
              echo 'dummy_secret_matched=False' >&2
            fi
            echo 'secret_value_printed=False' >&2
          )"
          status=$?
          echo "wrapper_exit=$status"
          if [ "$status" -ne 1 ]; then
            echo "proof_result=unexpected_exit"
            exit 1
          fi
          echo "proof_result=secret_read_by_parent_shell_and_wrapper_rejected_empty_ref"
